name: Deploy Reunion

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REUNION_HOST }}
          username: root
          key: ${{ secrets.REUNION_SSH_KEY }}
          script: |
            cd /opt/event_vmf
            git fetch origin main
            git reset --hard origin/main
            docker compose down
            docker compose up -d --build
            docker image prune -f --filter "label=com.docker.compose.project=event_vmf"
